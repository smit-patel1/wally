
# NEED TO CHECK: 
# - map → odom → base_link is publishing (it will all fail without erroring if this is not working)
# - lidar topic name matches localcostmap/voxel_layer/scan in this file
# - All footprints are accurate
# - All velo, accel, and movement values are reasonable
# - use_sim_time is 'Flase' everywhere (thats only for simulations)


#####################################################################################################
#                                 NAV2 CONTROL SERVER                                               #
#####################################################################################################

controller_server:
  ros__parameters:
    use_sim_time: Flase
    controller_frequency: 20.0        # MPPI likes higher frequencies (15-30Hz)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress Checker: Ensures the robot doesn't just stand still
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    # Goal Checker: Defines when the robot is fr at the goal
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    #####################################################################################################
    #                                 MPPI PERAM                                                        #
    #####################################################################################################
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56                        # Steps per trajectory
      model_dt: 0.05                        # Time in seconds per step
      batch_size: 2000                      # "Count of randomly sampled candidate trajectories from current optimal control sequence in a given iteration. 
                                            # 1000 @ 50 Hz or 2000 @ 30 Hz seems to produce good results."
      vy_max: 0.0                           # Apperently still have to declare these even with diff-drive
      vy_min: 0.0                           # See above ^
      vx_max: 0.3                           # max forward velo    m/s
      vx_min: -0.30                         # max reverse velo    m/s
      wz_max: 1.9                           # max rotational velo rad/s
      wz_min: -1.9                          # min rotational velo rad/s (other direction)
      iteration_count: 1
      motion_model: "DiffDrive"             # tank steering like we're using
      
      # --- Noise/Sampling (DiffDrive only[the one we use]) ---
      sampling_std:
        vx: 0.1                         # Standard deviation for forward velocity sampling
        wz: 0.3                         # Standard deviation for angular velocity sampling
        # vy is NOT needed for DiffDrive

      # --- Critics (The "Behavior" Logic) ---
      critics: ["ConstraintCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "ObstacleCritic", "TwirlingCritic"]
      # ! NOTE THAT ALL CRITIC WEIGHTS ARE RELATIVE AND NOT WEIGHED AGAINST OUSTIDE DATA !
      # ! INCREASING ALL WEIGHTS WILL NOT MAKE THE ROBOT WORK BETTER !

      ConstraintCritic: # Makes sure the path chosen falls within a valid set of instructions for our robot 
                        #(ex: robot cannot spontaniously achive 40mph speeds and revert to .3mph in less than a second even if the path would be perfect)
        enabled: true
        cost_weight: 4.0 

      GoalCritic:
        enabled: true
        cost_weight: 5.0
        threshold_to_consider: 1.4      # Distance to goal to start prioritizing this critic (too high of value can cause robot to ignore walls)
                                        # Think of it like final sprint. When should most other things be ignored in order to get to the goal (might need to be low for our purpouses)

      GoalAngleCritic:
        enabled: true
        cost_weight: 3.0
        threshold_to_consider: 0.5      # Facing the right direction at the goal area

      PathAlignCritic:
        enabled: true
        cost_weight: 10.0               # High weight keeps the robot strictly on the global path
        offset_from_furthest: 10        # Checks alignment further down the trajectory (alignment to path focus) lower if our vanagation is tight spaces is poopy

      PathFollowCritic:
        enabled: true
        cost_weight: 5.0                # How closley to follow path
        offset_from_furthest: 5         # Distance from path acceptable (proximity ot path focus)

      ObstacleCritic:
        enabled: true
        cost_weight: 20.0               # High weight to ensure safety
        consider_footprint: true        # Use robot footprint for collision checking

      TwirlingCritic:                   # Ensure robot does not become balet student rather than exploratory robot
        enabled: true
        twirling_cost_weight: 10.0

#####################################################################################################
#                                 NAV2 COSTMAPS                                                     #
#####################################################################################################

local_costmap: # local costmap is for everything other than smac probably
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      
      # IMPORTANT: Match this to your robot's physical shape
      # For a circular robot use 'robot_radius'
      # For rectangular use 'footprint'
      footprint: "[ [0.21, 0.21], [0.21, -0.21], [-0.21, -0.21], [-0.21, 0.21] ]" # WE NEED TO SET THIS LIKE NOW I HAVE NOT CHANGED TO ACUAL FOOTPRINT              ! NEEDS CONFIGURATION !
      
      plugins: ["voxel_layer", "inflation_layer"] #
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /your_lidar_topic   # replace with your actual topic                   ! NEEDS CONFIGURATION !
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"     # or PointCloud2 depending on nvblox slice output  ! NEEDS CONFIGURATION !
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55  # Should be slightly larger than robot radius


global_costmap: # Global costmap is for SMAC planner (will not work without)
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      resolution: 0.05
      footprint: "[ [0.21, 0.21], [0.21, -0.21], [-0.21, -0.21], [-0.21, 0.21] ]" #replace with fr footprint                               ! NEEDS CONFIGURATION !
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

#####################################################################################################
#                                 SMAC PLANNER SERVER                                               #
#####################################################################################################

planner_server:
  ros__parameters:
    use_sim_time: False
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D" # Optimized for diff-drive
      allow_unknown: true          # Set to false if you want to stay in mapped areas only (not us)
      tolerance: 0.1               # How close to the goal point
      max_iterations: 1000000      # Search limit                    (faster = less iterations)
      max_planning_time: 1.0       # Seconds
      cost_travel_multiplier: 1.0  # Weight of distance vs cost
      use_final_approach_orientation: false # Robot will face the goal pose orientation (i dont think we need to change this)
      
      # Smoother for Camera/LiDAR suite - handle sensor noise
      smoother:
        max_iterations: 1000      # self explanitory LOWERD FOR BETTER PERFORMANCE
        w_smooth: 0.3             # How much of a straight line the path is (calculates every 3 points) More = wider, sweeping turns. Don''t put too high or we can run into obstacles
        w_data: 0.2               # Counterbalance of above - how colse we stay to the path generated by the A* alg
        tolerance: 1.0e-10        # When do we not care? it'll take till max iterations if this number is 0 but if the change is lower than tolerance for an iteration it stops
                                  # high number = less smooth but faster calculation 

#####################################################################################################
#                          Velocity smoother to make MPPI less Jerky                                #
#####################################################################################################

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.0, 1.9]                   # Make these reasonable                                             ! NEEDS CONFIGURATION !
    min_velocity: [-0.3, 0.0, -1.9]                 #  ^
    max_accel: [1.5, 0.0, 2.0]                      # ^
    max_decel: [-1.5, 0.0, -2.0]                    # make these reasonable
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0







      
      
















































































































